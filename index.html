<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>신경계 응급키트 · 안전모드 연구소</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css" />
<style>
  :root{
    --cream:#F3EFE8;
    --sand:#ECE6D9;
    --ink:#2B2B28;
    --muted:#79746B;
    --green:#3A6B52;
    --green-soft:#7FA890;
    --green-tint:#E2EBE3;
    --line:#DED8CD;
    --radius:22px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
    background:var(--cream);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior:none;
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 20px 60px;min-height:100dvh;}

  /* ---------- HERO ---------- */
  header.hero{padding:48px 4px 26px;text-align:center;}
  .eyebrow{font-size:13px;letter-spacing:.14em;color:var(--green);font-weight:600;text-transform:uppercase;}
  .hero h1{font-size:30px;font-weight:800;margin:14px 0 6px;letter-spacing:-.02em;}
  .hero p{font-size:15px;color:var(--muted);margin:0;}
  .breather{width:120px;height:120px;margin:30px auto 8px;position:relative;}
  .ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid var(--green-soft);opacity:.45;
    animation:breathe 11s ease-in-out infinite;}
  .ring:nth-child(2){animation-delay:0s;}
  .core{position:absolute;top:50%;left:50%;width:26px;height:26px;margin:-13px 0 0 -13px;border-radius:50%;
    background:var(--green);animation:breatheCore 11s ease-in-out infinite;}
  @keyframes breathe{0%,100%{transform:scale(.5);opacity:.5}45%{transform:scale(1.25);opacity:.18}}
  @keyframes breatheCore{0%,100%{transform:scale(.7)}45%{transform:scale(1.15)}}
  .hint{font-size:13px;color:var(--muted);margin-top:2px;}

  /* ---------- LIST ---------- */
  .section-label{font-size:13px;color:var(--muted);font-weight:600;margin:30px 4px 12px;letter-spacing:.02em;}
  .tool{display:flex;align-items:center;gap:14px;width:100%;text-align:left;border:none;cursor:pointer;
    background:var(--sand);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 16px;margin-bottom:11px;transition:transform .12s ease, box-shadow .12s ease;}
  .tool:active{transform:scale(.985);}
  .tool:focus-visible{outline:2.5px solid var(--green);outline-offset:2px;}
  .tool .ic{flex:0 0 46px;height:46px;border-radius:14px;background:var(--green-tint);
    display:grid;place-items:center;font-size:22px;}
  .tool .meta{flex:1;min-width:0;}
  .tool .t{display:block;font-size:16px;font-weight:700;letter-spacing:-.01em;}
  .tool .d{display:block;font-size:13px;color:var(--muted);margin-top:3px;}
  .tool .dur{flex:0 0 auto;font-size:12px;font-weight:600;color:var(--green);
    background:var(--green-tint);border-radius:999px;padding:5px 9px;}

  footer.foot{margin-top:34px;padding:20px 6px 0;border-top:1px solid var(--line);text-align:center;}
  .foot .care{font-size:12.5px;color:var(--muted);line-height:1.65;}
  .foot .brand{font-size:13px;color:var(--ink);font-weight:700;margin-top:14px;}
  .foot a.cta{display:inline-block;margin-top:14px;font-size:14px;font-weight:700;color:var(--green);
    text-decoration:none;border:1.5px solid var(--green);border-radius:999px;padding:10px 18px;}

  /* ---------- PLAYER ---------- */
  .player{position:fixed;inset:0;background:var(--cream);display:none;flex-direction:column;z-index:50;}
  .player.on{display:flex;}
  .pbar-wrap{height:4px;background:var(--line);width:100%;}
  .pbar{height:100%;width:0;background:var(--green);transition:width .25s linear;}
  .ptop{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;}
  .ptop .ttl{font-size:15px;font-weight:700;}
  .pclose{border:none;background:transparent;font-size:15px;color:var(--muted);font-weight:600;cursor:pointer;padding:6px 4px;}
  .pclose:focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:8px;}
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 20px 30px;gap:18px;}
  canvas#cv{width:min(82vw,360px);height:min(82vw,360px);}
  .plabel{font-size:26px;font-weight:800;color:var(--green);min-height:34px;letter-spacing:-.01em;text-align:center;}
  .psub{font-size:15px;color:var(--muted);text-align:center;max-width:300px;min-height:22px;}
  .pcount{font-size:13px;color:var(--muted);letter-spacing:.04em;}

  /* completion */
  .done{position:absolute;inset:0;background:var(--cream);display:none;flex-direction:column;
    align-items:center;justify-content:center;gap:10px;padding:30px;text-align:center;}
  .done.on{display:flex;}
  .done .leaf{font-size:34px;}
  .done h2{font-size:24px;font-weight:800;margin:6px 0 0;}
  .done p{font-size:15px;color:var(--muted);margin:0;max-width:300px;}
  .done .row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;justify-content:center;}
  .btn{border:none;cursor:pointer;font-weight:700;font-size:14px;border-radius:999px;padding:12px 18px;font-family:inherit;}
  .btn.primary{background:var(--green);color:#fff;}
  .btn.ghost{background:transparent;color:var(--green);border:1.5px solid var(--green);}
  .btn.link{background:transparent;color:var(--muted);text-decoration:underline;padding:12px 8px;}
  .done a.btn{text-decoration:none;}

  @media (prefers-reduced-motion: reduce){
    .ring,.core{animation:none;}
    .ring{transform:scale(.9);} .core{transform:scale(.95);}
  }
</style>
</head>
<body>
<div class="wrap" id="home">
  <header class="hero">
    <div class="eyebrow">안전모드 연구소</div>
    <h1>신경계 응급키트</h1>
    <p>불안할 때, 잠 안 올 때 — 30초면 돼요.</p>
    <div class="breather" aria-hidden="true">
      <div class="ring"></div><div class="ring"></div>
      <div class="core"></div>
    </div>
    <div class="hint">하나만 골라서, 화면을 따라 해보세요.</div>
  </header>

  <div class="section-label">지금 바로 — 급할 때</div>
  <div id="list-quick"></div>

  <div class="section-label">조금 더 — 몸 풀기 · 잠</div>
  <div id="list-more"></div>

  <footer class="foot">
    <div class="care">
      이건 스스로를 진정시키는 자기돌봄 연습이에요.<br>
      의료·심리 치료를 대신하지 않아요. 많이 힘들면 혼자 두지 말고 전문가와 함께해요.
    </div>
    <a class="cta" href="https://bium-check.vercel.app" target="_blank" rel="noopener">내 신경계 상태 알아보기 →</a>
    <div class="brand">안전모드 연구소 · @emotion_lab_bium</div>
  </footer>
</div>

<!-- PLAYER -->
<div class="player" id="player" role="dialog" aria-modal="true" aria-label="가이드">
  <div class="pbar-wrap"><div class="pbar" id="pbar"></div></div>
  <div class="ptop">
    <div class="ttl" id="p-ttl">가이드</div>
    <button class="pclose" id="p-close">닫기 ✕</button>
  </div>
  <div class="stage">
    <canvas id="cv" width="720" height="720"></canvas>
    <div class="plabel" id="p-label"></div>
    <div class="psub" id="p-sub"></div>
    <div class="pcount" id="p-count"></div>
  </div>

  <div class="done" id="done">
    <div class="leaf">🌿</div>
    <h2 id="done-h">잘했어요</h2>
    <p id="done-p">어깨, 툭 내려놨나요? 불안은 누르는 게 아니라 몸한테 안전하다고 알려주는 거예요.</p>
    <div class="row">
      <button class="btn primary" id="done-again">한 번 더</button>
      <button class="btn ghost" id="done-home">처음으로</button>
    </div>
    <div class="row">
      <a class="btn link" href="https://bium-check.vercel.app" target="_blank" rel="noopener">내 신경계 상태 알아보기 →</a>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";
  var TAU = Math.PI*2;
  function ease(x){ x=Math.max(0,Math.min(1,x)); return x*x*(3-2*x); }
  function lerp(a,b,u){ return a+(b-a)*u; }
  function buzz(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms); }catch(e){} }

  var COL = {
    cream:'#F3EFE8', green:'#3A6B52', greenSoft:'#7FA890',
    tint:'#E2EBE3', line:'#DED8CD', ink:'#2B2B28', dim:'#1d2b22'
  };

  // ---------- TOOL DEFINITIONS ----------
  var TOOLS = [
    { id:'breath', icon:'🫁', title:'4-8 호흡', desc:'들숨 4초 · 날숨 8초', dur:'1분',
      seconds:60, type:'breath' },
    { id:'eyes', icon:'👀', title:'눈 좌우로', desc:'과각성 완화 · 가슴 답답할 때', dur:'30초',
      seconds:30, type:'lateral' },
    { id:'wide', icon:'🌍', title:'시야 넓히기', desc:'주변을 천천히 · 긴장 낮추기', dur:'30초',
      seconds:30, type:'panoramic' },
    { id:'sigh', icon:'😮‍💨', title:'생리적 한숨 3회', desc:'두 번 들이쉬고, 길게 내쉬고', dur:'30초',
      seconds:30, type:'sigh' },
    { id:'butterfly', icon:'🤲', title:'나비 포옹', desc:'좌우 교차로 톡톡', dur:'40초',
      seconds:40, type:'alternate' },
    { id:'feet', icon:'👣', title:'발바닥 감각 깨우기', desc:'바닥이 나를 받치고 있어요', dur:'36초',
      seconds:0, type:'steps', steps:[
        {t:'두 발을 바닥에 평평하게',  s:'신발은 벗어도 좋아요', sec:6},
        {t:'발뒤꿈치에 무게를 실어봐요', s:'천천히, 지그시', sec:6},
        {t:'엄지발가락으로 바닥을 눌러요', s:'', sec:6},
        {t:'새끼발가락 쪽도 눌러봐요',   s:'', sec:6},
        {t:'발바닥 전체로 바닥을 느껴요', s:'', sec:6},
        {t:'지금, 바닥이 나를 받치고 있어요', s:'애써 서 있지 않아도 돼요', sec:6}
      ]},
    { id:'neck', icon:'🧘', title:'목·어깨 힘 빼기', desc:'올렸다가, 툭', dur:'36초',
      seconds:0, type:'steps', steps:[
        {t:'숨을 들이쉬며 어깨를 귀까지', s:'바짝 끌어올려요', sec:5},
        {t:'잠깐, 멈춰요', s:'', sec:3},
        {t:'툭 — 떨어뜨려요', s:'길게 내쉬면서', sec:6},
        {t:'고개를 오른쪽으로 천천히', s:'귀가 어깨에 가까워지게', sec:7},
        {t:'반대쪽도 천천히', s:'', sec:7},
        {t:'턱의 힘을 풀고, 혀를 떼요', s:'입천장에서 혀를 살짝', sec:8}
      ]},
    { id:'sleep', icon:'😴', title:'잠 안 올 때 5분 루틴', desc:'호흡 → 눈 → 몸 내려놓기', dur:'5분',
      seconds:300, type:'sleep' }
  ];

  var QUICK = ['breath','eyes','wide','sigh'];

  // ---------- BUILD HOME LIST ----------
  function card(tool){
    var b = document.createElement('button');
    b.className = 'tool';
    b.setAttribute('aria-label', tool.title);
    b.innerHTML =
      '<span class="ic">'+tool.icon+'</span>'+
      '<span class="meta"><span class="t">'+tool.title+'</span>'+
      '<span class="d">'+tool.desc+'</span></span>'+
      '<span class="dur">'+tool.dur+'</span>';
    b.addEventListener('click', function(){ openTool(tool); });
    return b;
  }
  var lq = document.getElementById('list-quick');
  var lm = document.getElementById('list-more');
  TOOLS.forEach(function(t){ (QUICK.indexOf(t.id)>=0?lq:lm).appendChild(card(t)); });

  // ---------- PLAYER ENGINE ----------
  var player = document.getElementById('player');
  var pbar = document.getElementById('pbar');
  var pTtl = document.getElementById('p-ttl');
  var pLabel = document.getElementById('p-label');
  var pSub = document.getElementById('p-sub');
  var pCount = document.getElementById('p-count');
  var doneEl = document.getElementById('done');
  var cv = document.getElementById('cv');
  var ctx = cv.getContext('2d');
  var CVS = 720;

  var raf=null, start=0, cur=null, lastPhase='';

  function setCanvas(){
    var dpr = Math.min(window.devicePixelRatio||1, 2);
    cv.width = CVS*dpr; cv.height = CVS*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }

  function openTool(tool){
    cur = tool;
    pTtl.textContent = tool.title;
    pLabel.textContent=''; pSub.textContent=''; pCount.textContent='';
    pbar.style.width='0%';
    doneEl.classList.remove('on');
    player.classList.add('on');
    document.body.style.overflow='hidden';
    setCanvas();
    start = performance.now();
    lastPhase='';
    loop();
  }
  function closeTool(){
    if(raf) cancelAnimationFrame(raf); raf=null; cur=null;
    player.classList.remove('on');
    document.body.style.overflow='';
  }
  function finish(){
    if(raf) cancelAnimationFrame(raf); raf=null;
    pbar.style.width='100%';
    var msg = doneMessages[cur.id] || doneMessages._default;
    document.getElementById('done-h').textContent = msg.h;
    document.getElementById('done-p').textContent = msg.p;
    doneEl.classList.add('on');
    buzz([40,60,40]);
  }

  var doneMessages = {
    _default:{h:'잘했어요', p:'어깨, 툭 내려놨나요? 불안은 누르는 게 아니라 몸한테 안전하다고 알려주는 거예요.'},
    breath:{h:'잘 쉬었어요', p:'날숨이 길어지면 심박이 느려져요. 그게 신경계엔 "안전" 신호예요.'},
    eyes:{h:'잘했어요', p:'시선이 좌우로 움직이면 몸이 "둘러볼 여유가 있네 = 안전하네"로 읽어요.'},
    wide:{h:'시야가 넓어졌나요?', p:'좁아진 시야를 여는 것만으로도 위협 경보가 한 칸 내려가요.'},
    sigh:{h:'후—', p:'생리적 한숨은 가장 빠른 진정 스위치예요. 필요할 때 언제든.'},
    butterfly:{h:'스스로를 안아줬어요', p:'좌우 교차 자극은 과열된 뇌를 천천히 식혀줘요.'},
    feet:{h:'바닥을 느꼈나요?', p:'발바닥 감각은 지금 여기로 돌아오는 가장 단단한 길이에요.'},
    neck:{h:'힘이 빠졌나요?', p:'긴장은 "올렸다 툭" 풀 때 더 잘 놓여요.'},
    sleep:{h:'수고했어요', p:'잘 자려고 애쓰지 마세요. 몸이 안전하다고 느끼면, 잠은 따라와요.'}
  };

  // ----- drawing primitives -----
  function bg(){ ctx.fillStyle=COL.cream; ctx.fillRect(0,0,CVS,CVS); }
  function halo(x,y,r,p){
    p=p||1;
    [[3.2,0.10],[2.3,0.18],[1.6,0.32]].forEach(function(a){
      var rr=r*a[0]*p;
      ctx.beginPath(); ctx.fillStyle='rgba(127,168,144,'+a[1]+')';
      ctx.arc(x,y,rr,0,TAU); ctx.fill();
    });
  }
  function dot(x,y,r){
    ctx.beginPath(); ctx.fillStyle=COL.green; ctx.arc(x,y,r,0,TAU); ctx.fill();
    ctx.beginPath(); ctx.fillStyle='#fff'; ctx.arc(x,y,r*0.38,0,TAU); ctx.fill();
  }
  function setPhase(label, sub, doBuzz){
    if(label!==undefined && label!==lastPhase){
      lastPhase=label; if(doBuzz) buzz(30);
    }
    if(label!==undefined) pLabel.textContent=label;
    if(sub!==undefined) pSub.textContent=sub;
  }

  // ----- per-type frame renderers: return true when complete -----
  function frame(t){ // t = elapsed seconds
    var C=CVS/2;
    switch(cur.type){
      case 'breath': return drawBreath(t, 4, 8, C); 
      case 'lateral': return drawLateral(t, C);
      case 'panoramic': return drawPanoramic(t, C);
      case 'sigh': return drawSigh(t, C);
      case 'alternate': return drawButterfly(t, C);
      case 'steps': return drawSteps(t, C);
      case 'sleep': return drawSleep(t, C);
    }
    return true;
  }

  function drawBreath(t, inS, outS, C){
    bg();
    var cyc=inS+outS, p=t%cyc, f, lab, sub;
    if(p<inS){ f=ease(p/inS); lab='들이쉬고'; sub='코로, 배까지'; }
    else { f=1-ease((p-inS)/outS); lab='천천히 내쉬고'; sub='입으로, 길게'; }
    var minR=34, maxR=150, r=lerp(minR,maxR,f);
    ctx.beginPath(); ctx.strokeStyle=COL.line; ctx.lineWidth=3; ctx.arc(C,C,maxR,0,TAU); ctx.stroke();
    halo(C,C,r); dot(C,C,Math.max(r,16));
    setPhase(lab, sub, true);
    return false;
  }

  function drawLateral(t, C){
    bg();
    var amp=C-150, per=6, x=C+amp*Math.sin(TAU*(t/per)), y=C;
    ctx.beginPath(); ctx.strokeStyle=COL.line; ctx.lineWidth=3;
    ctx.moveTo(C-amp,y); ctx.lineTo(C+amp,y); ctx.stroke();
    [-amp,amp].forEach(function(dx){ ctx.beginPath(); ctx.fillStyle=COL.line; ctx.arc(C+dx,y,6,0,TAU); ctx.fill(); });
    halo(x,y,34); dot(x,y,28);
    setPhase('눈으로 점을 따라가요','고개는 그대로');
    return false;
  }

  function drawPanoramic(t, C){
    bg();
    // soft dim overlay with an expanding clear aperture
    var ap = ease(Math.min(t/12,1)); // grow over 12s
    var rad = lerp(C*0.22, C*1.15, ap);
    var g = ctx.createRadialGradient(C,C,rad*0.55,C,C,rad);
    g.addColorStop(0,'rgba(29,43,34,0)');
    g.addColorStop(1,'rgba(29,43,34,0.16)');
    ctx.fillStyle=g; ctx.fillRect(0,0,CVS,CVS);
    // small focus dot at center, gentle pulse
    var pr=10+4*Math.sin(t*1.4);
    halo(C,C,pr,0.8); dot(C,C,12);
    var lab,sub;
    if(t<6){ lab='정면, 한 점을'; sub='편하게 한 곳을 바라봐요'; }
    else if(t<14){ lab='이제 양옆으로'; sub='눈은 그대로, 곁눈으로 옆을 느껴요'; }
    else if(t<22){ lab='위아래 가장자리까지'; sub='시야를 천천히 넓혀요'; }
    else { lab='방 전체가 한눈에'; sub='넓어진 시야에 머물러요'; }
    setPhase(lab,sub);
    return false;
  }

  function drawSigh(t, C){
    bg();
    var rep=8, n=Math.floor(t/rep), p=t%rep, f, lab, sub;
    if(p<1.6){ f=ease(p/1.6)*0.7; lab='코로 들이쉬고'; sub=''; }
    else if(p<2.0){ f=0.7+ease((p-1.6)/0.4)*0.3; lab='한 번 더, 살짝!'; sub='짧게 톡 들이쉬어요'; }
    else if(p<7.0){ f=1-ease((p-2.0)/5.0); lab='입으로 길게 내쉬고'; sub='후—'; }
    else { f=0; lab='쉬고'; sub=''; }
    var r=lerp(30,150,f);
    ctx.beginPath(); ctx.strokeStyle=COL.line; ctx.lineWidth=3; ctx.arc(C,C,150,0,TAU); ctx.stroke();
    halo(C,C,Math.max(r,30)); dot(C,C,Math.max(r,14));
    setPhase(lab,sub, p<0.05);
    pCount.textContent = (Math.min(n+1,3))+' / 3';
    return false;
  }

  function drawButterfly(t, C){
    bg();
    var off=C*0.42, side=Math.floor(t/0.9)%2, prog=(t%0.9)/0.9;
    var xs=[C-off, C+off];
    [0,1].forEach(function(i){
      var act=(i===side);
      var base=22, r= act? base+12*(1-prog) : base;
      ctx.globalAlpha = act?1:0.4;
      if(act) halo(xs[i],C, r, 1);
      dot(xs[i],C, r);
      ctx.globalAlpha=1;
    });
    setPhase(side?'오른쪽':'왼쪽','두 손을 가슴에 X자로, 번갈아 톡', t%0.9<0.05);
    return false;
  }

  function drawSteps(t, C){
    bg();
    var steps=cur.steps, acc=0, idx=0, into=0, dur=1;
    for(var i=0;i<steps.length;i++){
      if(t < acc+steps[i].sec){ idx=i; into=t-acc; dur=steps[i].sec; break; }
      acc+=steps[i].sec; idx=i;
    }
    // gentle ambient pulse
    var pr=40+10*Math.sin(t*1.1);
    halo(C,C,pr,0.7); dot(C,C,20);
    // per-step ring
    var rr=180, frac=Math.min(into/dur,1);
    ctx.beginPath(); ctx.strokeStyle=COL.line; ctx.lineWidth=5; ctx.arc(C,C,rr,0,TAU); ctx.stroke();
    ctx.beginPath(); ctx.strokeStyle=COL.greenSoft; ctx.lineWidth=5; ctx.lineCap='round';
    ctx.arc(C,C,rr,-Math.PI/2, -Math.PI/2 + TAU*frac); ctx.stroke();
    setPhase(steps[idx].t, steps[idx].s, into<0.06);
    pCount.textContent = (idx+1)+' / '+steps.length;
    return false;
  }

  // 5-min sleep: 3 segments
  function drawSleep(t, C){
    if(t<120){          // 0-2min : 4-8 breath
      drawBreath(t,4,8,C);
      pCount.textContent='1 / 3 · 숨을 길게';
    } else if(t<210){   // 2-3.5min : lateral gaze (slow)
      bg();
      var amp=C-160, per=8, x=C+amp*Math.sin(TAU*((t-120)/per)), y=C;
      ctx.beginPath(); ctx.strokeStyle=COL.line; ctx.lineWidth=3; ctx.moveTo(C-amp,y); ctx.lineTo(C+amp,y); ctx.stroke();
      halo(x,y,30); dot(x,y,24);
      setPhase('눈을 천천히 좌우로','고개는 그대로, 힘 빼고');
      pCount.textContent='2 / 3 · 눈을 천천히';
    } else {            // 3.5-5min : body scan down
      bg();
      var seg=[ '이마와 눈가의 힘을 풀어요','턱과 혀를 내려놓아요','어깨를 무겁게 떨어뜨려요',
                '가슴과 배가 알아서 오르내리게','손끝, 다리, 발끝까지 무거워져요','이불에 몸을 완전히 맡겨요'];
      var st=Math.floor((t-210)/15); if(st>seg.length-1) st=seg.length-1;
      var pr=46+8*Math.sin((t)*0.8);
      halo(C,C,pr,0.6); dot(C,C,18);
      setPhase(seg[st],'내려놓을수록 좋아요', (t-210)%15<0.06);
      pCount.textContent='3 / 3 · 몸을 내려놓기';
    }
    return false;
  }

  // ----- main loop -----
  function loop(){
    raf = requestAnimationFrame(loop);
    var t = (performance.now()-start)/1000;
    var total = cur.seconds || (cur.steps? cur.steps.reduce(function(a,s){return a+s.sec;},0):30);
    frame(t);
    pbar.style.width = Math.min(t/total*100,100)+'%';
    if(t>=total) finish();
  }

  // ----- wiring -----
  document.getElementById('p-close').addEventListener('click', closeTool);
  document.getElementById('done-home').addEventListener('click', closeTool);
  document.getElementById('done-again').addEventListener('click', function(){
    doneEl.classList.remove('on'); start=performance.now(); lastPhase=''; pbar.style.width='0%';
    pLabel.textContent=''; pSub.textContent=''; pCount.textContent=''; loop();
  });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape' && player.classList.contains('on')) closeTool(); });
  window.addEventListener('resize', function(){ if(cur) setCanvas(); });
})();
</script>
</body>
